requests = "^2.23.0"
celery = "^4.4.2"
passlib = {extras = ["bcrypt"], version = "^1.7.2"}
tenacity = "^6.1.0"
pydantic = "^1.4"
raven = "^6.10.0"
gunicorn = "^20.0.4"
alembic = "^1.4.2"
python-jose = {extras = ["cryptography"], version = "^3.1.0"}
boto3 = "^1.26.8"
unidecode = "^1.3.6"
