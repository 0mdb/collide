greenlet = "^2.0.1"
gqlalchemy = "^1.3.3"
psycopg2-binary = "^2.9.5"
sqlmodel = "^0.0.8"

[tool.poetry.group.dev.dependencies]
mypy-extensions = "^0.4.3"
ipython = "^8.6.0"
typing-extensions = "^4.4.0"
epc = "^0.0.5"
importmagic = "^0.1.7"
